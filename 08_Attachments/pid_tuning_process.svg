<svg viewBox="0 0 1350 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1350" height="420" fill="#f8fafc"/>
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
  </marker>
  <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#0f172a" flood-opacity="0.18"/>
  </filter>
</defs>

<text x="675.0" y="40.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">
<tspan x="675.0" dy="0.0">MANUAL TUNING PROCESS</tspan>
</text>
<text x="675.0" y="64.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="500" fill="#64748b">
<tspan x="675.0" dy="0.0">The order we tuned turn_control and forward_control in — one term at a time</tspan>
</text>
<circle cx="195.0" cy="117.0" r="20" fill="#475569"/>
<text x="195.0" y="117.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#ffffff">
<tspan x="195.0" dy="0.0">1</tspan>
</text>
<rect x="65.0" y="145.0" width="260" height="190" rx="14" fill="#f1f5f9" stroke="#475569" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="195.0" y="169.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#1e293b">
<tspan x="195.0" dy="0.0">Zero D and I</tspan>
</text>
<text x="195.0" y="243.2" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">
<tspan x="195.0" dy="0.0">Start with Kp only.</tspan>
<tspan x="195.0" dy="17.6">D = 0, I = 0</tspan>
</text>
<line x1="333.0" y1="240" x2="377.0" y2="240" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<circle cx="515.0" cy="117.0" r="20" fill="#dc2626"/>
<text x="515.0" y="117.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#ffffff">
<tspan x="515.0" dy="0.0">2</tspan>
</text>
<rect x="385.0" y="145.0" width="260" height="190" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="515.0" y="169.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#991b1b">
<tspan x="515.0" dy="0.0">Raise P</tspan>
</text>
<text x="515.0" y="243.2" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">
<tspan x="515.0" dy="0.0">Increase Kp until the response</tspan>
<tspan x="515.0" dy="17.6">is close but slightly oscillates</tspan>
</text>
<line x1="653.0" y1="240" x2="697.0" y2="240" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<circle cx="835.0" cy="117.0" r="20" fill="#d97706"/>
<text x="835.0" y="117.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#ffffff">
<tspan x="835.0" dy="0.0">3</tspan>
</text>
<rect x="705.0" y="145.0" width="260" height="190" rx="14" fill="#fff7ed" stroke="#d97706" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="835.0" y="169.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#92400e">
<tspan x="835.0" dy="0.0">Add D</tspan>
</text>
<text x="835.0" y="243.2" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">
<tspan x="835.0" dy="0.0">Raise Kd just enough to</tspan>
<tspan x="835.0" dy="17.6">damp out that oscillation</tspan>
</text>
<line x1="973.0" y1="240" x2="1017.0" y2="240" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<circle cx="1155.0" cy="117.0" r="20" fill="#16a34a"/>
<text x="1155.0" y="117.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="800" fill="#ffffff">
<tspan x="1155.0" dy="0.0">4</tspan>
</text>
<rect x="1025.0" y="145.0" width="260" height="190" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="1155.0" y="169.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="16" font-weight="700" fill="#15803d">
<tspan x="1155.0" dy="0.0">Add I</tspan>
</text>
<text x="1155.0" y="243.2" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#334155">
<tspan x="1155.0" dy="0.0">Raise Ki so the system always</tspan>
<tspan x="1155.0" dy="17.6">returns to zero error</tspan>
</text>

</svg>