<line x1="610" y1="230" x2="670" y2="230" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="930" y1="230" x2="1030" y2="230" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="305" y1="460" x2="350" y2="460" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="610" y1="460" x2="670" y2="460" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="930" y1="460" x2="1030" y2="460" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="305" y1="690" x2="350" y2="690" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="610" y1="690" x2="670" y2="690" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="930" y1="690" x2="1030" y2="690" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="305" y1="920" x2="350" y2="920" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="610" y1="920" x2="670" y2="920" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="930" y1="920" x2="1030" y2="920" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<text x="725.0" y="1051.6" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#64748b">
<tspan x="725.0" dy="0.0">Every published field carries an age/timestamp. algorithm_task treats data older than its staleness</tspan>
<tspan x="725.0" dy="16.9">threshold (e.g. 500 ms for the Pi link) as unusable and falls back to a safe default.</tspan>
</text>

</svg>