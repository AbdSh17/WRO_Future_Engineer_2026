<svg viewBox="0 0 1400 950" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1400" height="950" fill="#f8fafc"/>
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 z" fill="#64748b"/>
  </marker>
  <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#0f172a" flood-opacity="0.18"/>
  </filter>
</defs>

<text x="700.0" y="42.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">
<tspan x="700.0" dy="0.0">FreeRTOS TASK ARCHITECTURE</tspan>
</text>
<text x="700.0" y="68.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="500" fill="#64748b">
<tspan x="700.0" dy="0.0">ESP32 — five tasks communicating through a mutex-protected shared-state layer</tspan>
</text>
<rect x="30.0" y="104.0" width="290" height="92" rx="14" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="175" y="128.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#5b21b6">
<tspan x="175" dy="0.0">imu_task</tspan>
</text>
<text x="175" y="154.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.8" font-weight="400" fill="#334155">
<tspan x="175" dy="0.0">Reads BNO055 (I2C_1) → yaw angle</tspan>
<tspan x="175" dy="15.9">period 10 ms   priority 5   stack 2048</tspan>
</text>
<rect x="30.0" y="254.0" width="290" height="92" rx="14" fill="#ecfeff" stroke="#0891b2" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="175" y="278.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#0e7490">
<tspan x="175" dy="0.0">tof_task</tspan>
</text>
<text x="175" y="304.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.8" font-weight="400" fill="#334155">
<tspan x="175" dy="0.0">Reads VL53L0X front ToF (I2C_0)</tspan>
<tspan x="175" dy="15.9">period 20 ms   priority 5   stack 3072</tspan>
</text>
<rect x="30.0" y="404.0" width="290" height="92" rx="14" fill="#eff6ff" stroke="#2563eb" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="175" y="428.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#1d4ed8">
<tspan x="175" dy="0.0">rpi_task</tspan>
</text>
<text x="175" y="454.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.8" font-weight="400" fill="#334155">
<tspan x="175" dy="0.0">Parses UART lines from the Pi (Baggy feed)</tspan>
<tspan x="175" dy="15.9">period 20 ms   priority 5   stack 3072</tspan>
</text>
<rect x="30.0" y="561.0" width="290" height="78" rx="14" fill="#fdf4ff" stroke="#a21caf" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="175" y="585.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#86198f">
<tspan x="175" dy="0.0">encoder ISR</tspan>
</text>
<text x="175" y="604.2" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.5" font-weight="400" fill="#334155">
<tspan x="175" dy="0.0">Hall-effect pulses, direct read</tspan>
<tspan x="175" dy="15.5">no task / no mutex (IRAM_ATTR)</tspan>
</text>
<rect x="560" y="110" width="280" height="610" rx="16" fill="#fffbeb" stroke="#d97706" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="700" y="138.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="800" fill="#92400e">
<tspan x="700" dy="0.0">SHARED STATE</tspan>
</text>
<text x="700" y="157.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#b45309">
<tspan x="700" dy="0.0">(mutex-protected structs)</tspan>
</text>
<line x1="560" y1="188" x2="840" y2="188" stroke="#fde68a" stroke-width="1.4"/>
<text x="700" y="150.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#78350f">
<tspan x="700" dy="0.0">yaw_mutex</tspan>
</text>
<line x1="560" y1="338" x2="840" y2="338" stroke="#fde68a" stroke-width="1.4"/>
<text x="700" y="300.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#78350f">
<tspan x="700" dy="0.0">tof_mutex</tspan>
</text>
<line x1="560" y1="488" x2="840" y2="488" stroke="#fde68a" stroke-width="1.4"/>
<text x="700" y="450.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#78350f">
<tspan x="700" dy="0.0">rpi_mutex</tspan>
</text>
<line x1="560" y1="638" x2="840" y2="638" stroke="#fde68a" stroke-width="1.4"/>
<text x="700" y="600.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#78350f">
<tspan x="700" dy="0.0">(ISR-safe, no mutex)</tspan>
</text>
<line x1="320" y1="150" x2="555" y2="150" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="320" y1="300" x2="555" y2="300" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="320" y1="450" x2="555" y2="450" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<line x1="320" y1="600" x2="555" y2="600" stroke="#94a3b8" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<rect x="1065.0" y="194.0" width="290" height="92" rx="14" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="1210" y="218.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#991b1b">
<tspan x="1210" dy="0.0">control_task</tspan>
</text>
<text x="1210" y="244.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.8" font-weight="400" fill="#334155">
<tspan x="1210" dy="0.0">Runs turn / forward PID → servo + motor</tspan>
<tspan x="1210" dy="15.9">period 50 ms   priority 6 (highest)   stack 8192</tspan>
</text>
<rect x="1065.0" y="394.0" width="290" height="92" rx="14" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="1210" y="418.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#15803d">
<tspan x="1210" dy="0.0">algorithm_task</tspan>
</text>
<text x="1210" y="444.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.8" font-weight="400" fill="#334155">
<tspan x="1210" dy="0.0">State machine — decides what happens next</tspan>
<tspan x="1210" dy="15.9">period 50 ms   priority 4   stack 6144</tspan>
</text>
<rect x="1065.0" y="591.0" width="290" height="78" rx="14" fill="#f1f5f9" stroke="#475569" stroke-width="2" filter="url(#soft-shadow)"/>
<text x="1210" y="615.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15.5" font-weight="700" fill="#1e293b">
<tspan x="1210" dy="0.0">Actuators</tspan>
</text>
<text x="1210" y="634.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11.8" font-weight="400" fill="#334155">
<tspan x="1210" dy="0.0">motor_control + servo_control</tspan>
<tspan x="1210" dy="15.9">(LEDC PWM → TB6612FNG + MG996R)</tspan>
</text>
<line x1="845" y1="210" x2="1065" y2="240" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<rect x="898.9" y="204.0" width="112.3" height="18" rx="4" fill="#ffffff" opacity="0.92"/>
<text x="955.0" y="217.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#64748b">
<tspan x="955.0" dy="0.0">reads: yaw, tof</tspan>
</text>
<line x1="845" y1="470" x2="1065" y2="440" stroke="#64748b" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<rect x="806.8" y="434.0" width="296.4" height="18" rx="4" fill="#ffffff" opacity="0.92"/>
<text x="955.0" y="447.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#64748b">
<tspan x="955.0" dy="0.0">reads: yaw, tof, rpi nav,
encoder distance</tspan>
</text>
<path d="M 1210,286 Q 1440,360 1405,440" fill="none" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<rect x="1285.0" y="339.0" width="310.1" height="18" rx="4" fill="#ffffff" opacity="0.92"/>
<text x="1440" y="352.0" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#334155">
<tspan x="1440" dy="0.0">ctrl_request_turn() /
ctrl_request_forward()</tspan>
</text>
<line x1="1210" y1="286" x2="1210" y2="591" stroke="#334155" stroke-width="2.2" marker-end="url(#arrowhead)"/>
<rect x="1164.1" y="417.5" width="91.8" height="18" rx="4" fill="#ffffff" opacity="0.92"/>
<text x="1210.0" y="430.5" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="700" fill="#334155">
<tspan x="1210.0" dy="0.0">drive output</tspan>
</text>
<text x="60" y="760.0" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1e293b">
<tspan x="60" dy="0.0">Legend</tspan>
</text>
<rect x="60" y="771" width="20" height="16" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.6"/>
<text x="90" y="780.0" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#334155">
<tspan x="90" dy="0.0">IMU</tspan>
</text>
<rect x="60" y="795" width="20" height="16" rx="4" fill="#ecfeff" stroke="#0891b2" stroke-width="1.6"/>
<text x="90" y="804.0" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#334155">
<tspan x="90" dy="0.0">Front ToF</tspan>
</text>
<rect x="60" y="819" width="20" height="16" rx="4" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/>
<text x="90" y="828.0" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#334155">
<tspan x="90" dy="0.0">Pi link (Baggy / vision)</tspan>
</text>
<rect x="60" y="843" width="20" height="16" rx="4" fill="#fdf4ff" stroke="#a21caf" stroke-width="1.6"/>
<text x="90" y="852.0" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#334155">
<tspan x="90" dy="0.0">Encoder (ISR, no mutex)</tspan>
</text>
<rect x="60" y="867" width="20" height="16" rx="4" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
<text x="90" y="876.0" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#334155">
<tspan x="90" dy="0.0">Shared state layer</tspan>
</text>
<rect x="60" y="891" width="20" height="16" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.6"/>
<text x="90" y="900.0" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#334155">
<tspan x="90" dy="0.0">Highest-priority control</tspan>
</text>
<rect x="60" y="915" width="20" height="16" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/>
<text x="90" y="924.0" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12.5" font-weight="500" fill="#334155">
<tspan x="90" dy="0.0">Decision layer</tspan>
</text>
<text x="1210" y="891.9" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" font-weight="500" fill="#64748b">
<tspan x="1210" dy="0.0">algorithm_task never touches hardware directly —</tspan>
<tspan x="1210" dy="16.2">it only calls ctrl_request_*(), control_task owns the outputs.</tspan>
</text>

</svg>